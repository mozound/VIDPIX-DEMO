<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f17"/>
      <stop offset="100%" stop-color="#141c2c"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e8ff"/>
      <stop offset="100%" stop-color="#00ff8c"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Border glow -->
  <rect x="6" y="6" width="500" height="500" rx="90" fill="none" stroke="url(#glow)" stroke-width="4" opacity="0.3"/>
  <!-- Screen frame -->
  <rect x="80" y="120" width="352" height="220" rx="12" fill="none" stroke="#00e8ff" stroke-width="8" opacity="0.9"/>
  <!-- Rule of thirds lines -->
  <line x1="197" y1="120" x2="197" y2="340" stroke="#00e8ff" stroke-width="2" opacity="0.35"/>
  <line x1="315" y1="120" x2="315" y2="340" stroke="#00e8ff" stroke-width="2" opacity="0.35"/>
  <line x1="80" y1="193" x2="432" y2="193" stroke="#00e8ff" stroke-width="2" opacity="0.35"/>
  <line x1="80" y1="267" x2="432" y2="267" stroke="#00e8ff" stroke-width="2" opacity="0.35"/>
  <!-- Center dot -->
  <circle cx="256" cy="230" r="8" fill="#ff3860" opacity="0.8"/>
  <circle cx="256" cy="230" r="18" fill="none" stroke="#ff3860" stroke-width="2" opacity="0.4"/>
  <!-- Corner marks -->
  <path d="M96 155 L96 136 L115 136" fill="none" stroke="#00ff8c" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
  <path d="M417 155 L417 136 L398 136" fill="none" stroke="#00ff8c" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
  <path d="M96 305 L96 324 L115 324" fill="none" stroke="#00ff8c" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
  <path d="M417 305 L417 324 L398 324" fill="none" stroke="#00ff8c" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
  <!-- Ruler ticks top -->
  <line x1="120" y1="120" x2="120" y2="108" stroke="#00e8ff" stroke-width="2" opacity="0.5"/>
  <line x1="160" y1="120" x2="160" y2="112" stroke="#00e8ff" stroke-width="1.5" opacity="0.3"/>
  <line x1="200" y1="120" x2="200" y2="108" stroke="#00e8ff" stroke-width="2" opacity="0.5"/>
  <line x1="240" y1="120" x2="240" y2="112" stroke="#00e8ff" stroke-width="1.5" opacity="0.3"/>
  <line x1="280" y1="120" x2="280" y2="108" stroke="#00e8ff" stroke-width="2" opacity="0.5"/>
  <line x1="320" y1="120" x2="320" y2="112" stroke="#00e8ff" stroke-width="1.5" opacity="0.3"/>
  <line x1="360" y1="120" x2="360" y2="108" stroke="#00e8ff" stroke-width="2" opacity="0.5"/>
  <line x1="400" y1="120" x2="400" y2="112" stroke="#00e8ff" stroke-width="1.5" opacity="0.3"/>
  <!-- PX text -->
  <text x="256" y="420" text-anchor="middle" font-family="monospace" font-weight="700" font-size="72" fill="#00e8ff" letter-spacing="8">VIDPIX</text>
  <!-- Subtle scan line effect -->
  <rect x="80" y="160" width="352" height="1" fill="#00e8ff" opacity="0.06"/>
  <rect x="80" y="200" width="352" height="1" fill="#00e8ff" opacity="0.06"/>
  <rect x="80" y="240" width="352" height="1" fill="#00e8ff" opacity="0.06"/>
  <rect x="80" y="280" width="352" height="1" fill="#00e8ff" opacity="0.06"/>
  <rect x="80" y="320" width="352" height="1" fill="#00e8ff" opacity="0.06"/>
</svg>
